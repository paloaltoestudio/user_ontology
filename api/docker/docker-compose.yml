version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: registration_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: registration_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d registration_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network

  fastapi:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: registration_api
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/registration_db"
      SECRET_KEY: "your-super-secret-key-change-in-production"
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ..:/app
    networks:
      - app_network
    command: >
      bash -c "alembic upgrade head &&
               uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
