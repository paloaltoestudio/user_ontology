# /etc/nginx/conf.d/app.conf
# Served via "include /etc/nginx/conf.d/*.conf" in the main nginx.conf

upstream api_backend {
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml;

    # --- Security headers ---
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;

    # --- Static SPA files ---
    root /usr/share/nginx/html;
    index index.html;

    # Static assets: long cache, immutable (Vite hashes filenames)
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- MCP endpoint (SSE / streaming) ---
    # Must come before /api/ to avoid prefix overlap, and must NOT buffer
    location /mcp {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # SSE / streaming: disable all buffering
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         300s;
        proxy_send_timeout         300s;
        chunked_transfer_encoding  on;

        # Required for SSE: tell nginx not to buffer the response
        proxy_set_header X-Accel-Buffering no;
    }

    # --- FastAPI backend (REST API) ---
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Standard API timeouts
        proxy_connect_timeout  10s;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;

        # Enable buffering for regular API responses (improves throughput)
        proxy_buffering on;
        proxy_buffer_size     4k;
        proxy_buffers         8 4k;
    }

    # --- SPA fallback (client-side routing) ---
    # All routes not matched above serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
